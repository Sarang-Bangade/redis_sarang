services:
  redis:
    image: redis:7-alpine
    container_name: sarang-aur-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly","yes"]
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7   
    container_name: sarang_aur_mongo
    ports:
     - "27017:27017"
    environment:
       MONGO_INITDB_DATABASE: sarang_aur_redis
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data: